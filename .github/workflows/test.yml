name: Tests

on:
  push:
    branches: [ main, develop10 ]
    paths:
      - 'client/tests/**'
      - 'client/srcs/**'
      - 'client/incs/**'
      - 'client/Makefile'
  pull_request:
    branches: [ main, develop10 ]
    paths:
      - 'client/tests/**'
      - 'client/srcs/**'
      - 'client/incs/**'
      - 'client/Makefile'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          valgrind \
          build-essential \
          cmake \
          git

    - name: Cache libraries
      uses: actions/cache@v4
      with:
        path: |
          client/libs/googletest
        key: ${{ runner.os }}-gtest-${{ hashFiles('client/Makefile') }}
        restore-keys: |
          ${{ runner.os }}-gtest-

    - name: Build Google Test
      run: make check_gtest

    - name: Build and run tests
      run: make test

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          client/run_tests_debug
          client/test_results.json
        if-no-files-found: ignore

    - name: Test Report
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        ./run_tests_debug --gtest_output=json:test_results.json || true
        if [ -f test_results.json ]; then
          echo "Tests completed. Check artifacts for details." >> $GITHUB_STEP_SUMMARY
        fi