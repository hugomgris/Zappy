name: CI

on:
  push:
    branches:
      - main
      - 'develop-v3-*'
  pull_request:
    branches:
      - main
      - 'develop-v3-*'

jobs:

  # ------------------------------------------------------------------ #
  #  Client — builds the client and runs the gtest suite                #
  # ------------------------------------------------------------------ #
  client:
    name: Client tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            valgrind

      - name: Cache googletest
        uses: actions/cache@v4
        with:
          path: client/libs/googletest
          key: ${{ runner.os }}-gtest-v1.14.0
          restore-keys: ${{ runner.os }}-gtest-

      - name: Build and run tests
        run: make ci-test

      - name: Upload test binary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-binary
          path: client/run_tests_debug
          if-no-files-found: ignore

